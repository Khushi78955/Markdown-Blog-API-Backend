openapi: 3.0.0

info:
  title: Markdown Blog API
  version: 1.0.0
  description: REST API for a Markdown Blog Backend

servers:
  - url: http://localhost:2000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /:
    get:
      tags:
        - Health
      summary: Check API status
      security: []
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Markdown Blog API is running

  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      security: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: Khushi

                email:
                  type: string
                  example: khushi@gmail.com

                password:
                  type: string
                  example: password123

      responses:
        "201":
          description: User registered successfully

        "409":
          description: Email already exists

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      security: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: khushi@gmail.com

                password:
                  type: string
                  example: password123

      responses:
        "200":
          description: Login successful

        "401":
          description: Invalid credentials

  /posts:
    get:
      tags:
        - Posts
      summary: Get all posts

      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search posts by title or content

        - in: query
          name: tag
          schema:
            type: string
          description: Filter posts by tag

        - in: query
          name: page
          schema:
            type: integer
            example: 1

        - in: query
          name: limit
          schema:
            type: integer
            example: 10

      responses:
        "200":
          description: Posts fetched successfully

    post:
      tags:
        - Posts
      summary: Create a new post

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - markdownBody
              properties:
                title:
                  type: string
                  example: Learning Node.js

                markdownBody:
                  type: string
                  example: |
                    # Node

                    Learning backend.

                    #node #backend

      responses:
        "201":
          description: Post created successfully

        "401":
          description: Unauthorized

        "409":
          description: Duplicate title

  /posts/{slug}:
    get:
      tags:
        - Posts
      summary: Get a single post

      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          example: learning-nodejs

      responses:
        "200":
          description: Post found

        "404":
          description: Post not found

    put:
      tags:
        - Posts
      summary: Update a post

      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          example: learning-nodejs

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - markdownBody
              properties:
                title:
                  type: string
                  example: Updated Node Guide

                markdownBody:
                  type: string
                  example: |
                    # Updated

                    Updated markdown content.

                    #node

      responses:
        "200":
          description: Post updated successfully

        "401":
          description: Unauthorized

        "404":
          description: Post not found

    delete:
      tags:
        - Posts
      summary: Delete a post

      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
          example: learning-nodejs

      responses:
        "200":
          description: Post deleted successfully

        "401":
          description: Unauthorized

        "404":
          description: Post not found